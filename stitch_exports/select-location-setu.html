<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>City &amp; Neighborhood Selector</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#1b1b1b",
                        "background": "#faf9f9",
                        "inverse-primary": "#c6c6c6",
                        "primary": "#000000",
                        "secondary-fixed-dim": "#c7c6c6",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e9e8e8",
                        "surface-container": "#efeeed",
                        "on-primary-container": "#848484",
                        "secondary-container": "#e1dfdf",
                        "outline-variant": "#cfc4c5",
                        "outline": "#7e7576",
                        "on-surface": "#1a1c1c",
                        "surface": "#faf9f9",
                        "surface-tint": "#5e5e5e",
                        "secondary": "#5e5e5e",
                        "on-surface-variant": "#4c4546",
                        "on-secondary-container": "#626262",
                        "on-secondary-fixed-variant": "#464747",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-secondary-fixed": "#1b1c1c",
                        "primary-fixed-dim": "#c6c6c6",
                        "tertiary-container": "#1a1c1c",
                        "surface-variant": "#e3e2e2",
                        "surface-container-low": "#f4f3f3",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#e2e2e2",
                        "primary-container": "#1b1b1b",
                        "error-container": "#ffdad6",
                        "tertiary": "#000000",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#838484",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "secondary-fixed": "#e4e2e2",
                        "inverse-surface": "#2f3131",
                        "inverse-on-surface": "#f1f0f0",
                        "surface-container-highest": "#e3e2e2",
                        "surface-bright": "#faf9f9",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-background": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "base": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600" }],
                        "label-sm": ["10px", { "lineHeight": "14px", "letterSpacing": "0.5px", "fontWeight": "600" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="radio"]:checked + div {
            border-color: #000000;
            background-color: #f4f3f3;
        }
        input[type="radio"]:checked + div .radio-inner {
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-background z-50">
<div class="flex justify-between items-center px-margin-mobile h-12 w-full max-w-3xl mx-auto">
<button aria-label="Go back" class="flex items-center justify-center p-2 -ml-2 text-primary hover:opacity-80 transition-opacity duration-200 active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary-container invisible">Select Location</h1>
<button class="text-primary font-label-lg text-label-lg hover:opacity-80 transition-opacity duration-200 active:scale-95">
                Skip
            </button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-16 pb-24 px-margin-mobile max-w-3xl mx-auto w-full flex flex-col gap-lg">
<!-- Header Text -->
<div class="mb-sm">
<h2 class="font-headline-lg text-headline-lg text-primary mb-xs">Where are you looking?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select your city and neighborhood to see available services.</p>
</div>
<!-- City Search Bar -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">search</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg leading-5 bg-surface text-on-surface placeholder-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm transition-colors font-body-md text-body-md" id="citySearch" placeholder="Select your city" type="text"/>
</div>
<!-- Popular Cities -->
<div class="flex flex-col gap-sm">
<h3 class="font-label-lg text-label-lg text-on-surface">Popular Cities</h3>
<div class="grid grid-cols-2 gap-sm">
<label class="relative cursor-pointer">
<input class="peer sr-only" name="city" onchange="showNeighborhoods()" type="radio" value="bangalore"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Bangalore</span>
<div class="w-4 h-4 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary">
<div class="w-2 h-2 rounded-full radio-inner transition-colors"></div>
</div>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="city" onchange="showNeighborhoods()" type="radio" value="mumbai"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Mumbai</span>
<div class="w-4 h-4 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary">
<div class="w-2 h-2 rounded-full radio-inner transition-colors"></div>
</div>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="city" onchange="showNeighborhoods()" type="radio" value="delhi"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Delhi NCR</span>
<div class="w-4 h-4 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary">
<div class="w-2 h-2 rounded-full radio-inner transition-colors"></div>
</div>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="city" onchange="showNeighborhoods()" type="radio" value="hyderabad"/>
<div class="p-3 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Hyderabad</span>
<div class="w-4 h-4 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary">
<div class="w-2 h-2 rounded-full radio-inner transition-colors"></div>
</div>
</div>
</label>
</div>
</div>
<!-- Neighborhood Section (Hidden by default) -->
<div class="hidden flex-col gap-md mt-md animate-fade-in-up" id="neighborhoodSection">
<div class="h-[1px] w-full bg-surface-container-high mb-sm"></div>
<h3 class="font-label-lg text-label-lg text-on-surface">Select your neighborhood</h3>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">search</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg leading-5 bg-surface text-on-surface placeholder-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm transition-colors font-body-md text-body-md" id="neighborhoodSearch" placeholder="Search areas..." type="text"/>
</div>
<div class="flex flex-col border border-outline-variant rounded-lg bg-surface overflow-hidden max-h-64 overflow-y-auto hide-scrollbar">
<!-- List Items (Simulated) -->
<button class="w-full text-left p-4 border-b border-surface-container-high hover:bg-surface-container-low transition-colors flex justify-between items-center group">
<span class="font-body-md text-body-md text-on-surface">Indiranagar</span>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<button class="w-full text-left p-4 border-b border-surface-container-high hover:bg-surface-container-low transition-colors flex justify-between items-center group">
<span class="font-body-md text-body-md text-on-surface">Koramangala</span>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<button class="w-full text-left p-4 border-b border-surface-container-high hover:bg-surface-container-low transition-colors flex justify-between items-center group">
<span class="font-body-md text-body-md text-on-surface">Whitefield</span>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<button class="w-full text-left p-4 border-b border-surface-container-high hover:bg-surface-container-low transition-colors flex justify-between items-center group">
<span class="font-body-md text-body-md text-on-surface">Jayanagar</span>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<button class="w-full text-left p-4 hover:bg-surface-container-low transition-colors flex justify-between items-center group">
<span class="font-body-md text-body-md text-on-surface">HSR Layout</span>
<span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar (Transaction context, so suppressed based on rules, but structure kept for demonstration if needed. Left blank as per "Suppress navigation if linear/transactional") -->
<script>
        function showNeighborhoods() {
            const section = document.getElementById('neighborhoodSection');
            section.classList.remove('hidden');
            section.classList.add('flex');
            
            // Simple animation
            section.style.opacity = '0';
            section.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                section.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                section.style.opacity = '1';
                section.style.transform = 'translateY(0)';
            }, 10);
        }
    </script>
</body></html>
